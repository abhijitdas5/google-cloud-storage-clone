<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>

<body>

<script>
const token = localStorage.getItem("token")
if (!token) {
  alert("Login first ❌")
  window.location.href = "login.html"
}
</script>

<h1>📁 Dashboard</h1>

<a href="upload.html">Upload File</a>

<br><br>

<input type="text" id="search" placeholder="Search file..." onkeyup="searchFile()">

<div id="fileList"></div>

<br>

<button onclick="logout()">Logout</button>

<script>

let allFiles = []

function logout() {
  localStorage.removeItem("token")
  window.location.href = "login.html"
}

// LOAD FILES
async function loadFiles() {

  const token = localStorage.getItem("token")

  const res = await fetch("http://localhost:5000/files", {
    headers: {
      Authorization: token
    }
  })

  const files = await res.json()
  allFiles = files
  showFiles(files)
}

// SHOW FILES
function showFiles(files) {

  const list = document.getElementById("fileList")
  list.innerHTML = ""

  files.forEach(file => {

    const div = document.createElement("div")

    div.innerHTML = `
      <p><b>${file.name}</b></p>
      <p>Size: ${file.size} bytes</p>
      <p>Type: ${file.type}</p>

      <a href="http://localhost:5000/uploads/${file.name}" download>
        <button>Download</button>
      </a>

      <button onclick="deleteFile('${file.name}')">Delete</button>
      <hr>
    `

    list.appendChild(div)
  })
}

// DELETE
async function deleteFile(name) {

  await fetch("http://localhost:5000/files/" + name, {
    method: "DELETE"
  })

  alert("Deleted ❌")
  loadFiles()
}

// SEARCH (API based)
async function searchFile() {

  const value = document.getElementById("search").value

  const token = localStorage.getItem("token")

  const res = await fetch(`http://localhost:5000/files/search?q=${value}`, {
    headers: {
      Authorization: token
    }
  })

  const files = await res.json()
  showFiles(files)
}

// INIT
loadFiles()

</script>

</body>
</html>
