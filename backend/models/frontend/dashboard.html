<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>

<body>

<h2>Dashboard</h2>

<input type="text" id="search" placeholder="Search file..." />
<button onclick="searchFile()">Search</button>

<div id="files"></div>

<script>

// 🔥 CHECK LOGIN
const token = localStorage.getItem("token")

if (!token) {
    alert("Please login first")
    window.location.href = "/login.html"
}

// 🔥 LOAD FILES
async function loadFiles() {
    try {
        const res = await fetch("https://google-cloud-storage-clone.onrender.com/files", {
            headers: {
                Authorization: "Bearer " + token
            }
        })

        // ❌ server error handle
        if (!res.ok) {
            const text = await res.text()
            console.log("SERVER ERROR:", text)
            alert("Backend error — check console")
            return
        }

        const files = await res.json()
        showFiles(files)

    } catch (err) {
        console.log("FETCH ERROR:", err)
        alert("Network error")
    }
}


// 🔥 SHOW FILES
function showFiles(files) {
    const fileList = document.getElementById("files")
    fileList.innerHTML = ""

    if (files.length === 0) {
        fileList.innerHTML = "<p>No files uploaded</p>"
        return
    }

    files.forEach(file => {
        fileList.innerHTML += `
            <p>
                ${file.filename}
                <button onclick="deleteFile('${file._id}')">Delete</button>
            </p>
        `
    })
}


// 🔥 DELETE FILE
async function deleteFile(id) {
    try {
        await fetch(`https://google-cloud-storage-clone.onrender.com/files/${id}`, {
            method: "DELETE",
            headers: {
                Authorization: "Bearer " + token
            }
        })

        loadFiles()

    } catch (err) {
        console.log(err)
    }
}


// 🔥 SEARCH FILE
async function searchFile() {
    const value = document.getElementById("search").value

    try {
        const res = await fetch(`https://google-cloud-storage-clone.onrender.com/files/search?q=${value}`, {
            headers: {
                Authorization: "Bearer " + token
            }
        })

        if (!res.ok) {
            alert("Search error")
            return
        }

        const files = await res.json()
        showFiles(files)

    } catch (err) {
        console.log(err)
    }
}


// INIT
loadFiles()

</script>

</body>
</html>
