<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input {
      padding: 8px;
    }
    button {
      padding: 8px;
      margin-left: 5px;
    }
    .file {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h2>Dashboard</h2>

<input type="text" id="search" placeholder="Search file..." />
<button onclick="searchFile()">Search</button>
<button onclick="logout()">Logout</button>

<hr>

<div id="files"></div>

<script>
const BASE_URL = "https://google-cloud-storage-clone.onrender.com"

// 🔥 Load all files
async function loadFiles() {
  const token = localStorage.getItem("token")

  if (!token) {
    alert("Login first")
    window.location.href = "/login.html"
    return
  }

  try {
    const res = await fetch(BASE_URL + "/files", {
      headers: {
        Authorization: "Bearer " + token
      }
    })

    const data = await res.json()
    showFiles(data)

  } catch (err) {
    alert("Error loading files")
  }
}

// 🔥 Search file
async function searchFile() {
  const value = document.getElementById("search").value
  const token = localStorage.getItem("token")

  try {
    const res = await fetch(BASE_URL + "/files/search?q=" + value, {
      headers: {
        Authorization: "Bearer " + token
      }
    })

    const data = await res.json()
    showFiles(data)

  } catch (err) {
    alert("Search error")
  }
}

// 🔥 Show files
function showFiles(files) {
  const container = document.getElementById("files")
  container.innerHTML = ""

  if (!files || files.length === 0) {
    container.innerHTML = "<p>No files found</p>"
    return
  }

  files.forEach(file => {
    const div = document.createElement("div")
    div.className = "file"

    div.innerHTML = `
      <b>${file.filename || "No name"}</b><br>
      <a href="${BASE_URL}/${file.path}" target="_blank">Download</a>
      <br><br>
      <button onclick="deleteFile('${file._id}')">Delete</button>
    `

    container.appendChild(div)
  })
}

// 🔥 Delete file
async function deleteFile(id) {
  const token = localStorage.getItem("token")

  await fetch(BASE_URL + "/files/" + id, {
    method: "DELETE",
    headers: {
      Authorization: "Bearer " + token
    }
  })

  alert("Deleted")
  loadFiles()
}

// 🔥 Logout
function logout() {
  localStorage.removeItem("token")
  window.location.href = "/login.html"
}

// INIT
loadFiles()
</script>

</body>
</html>
